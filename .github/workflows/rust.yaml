name: Getareel Build

on:
    push:
        branches: [ "main" ]
    pull_request:
        branches: [ "main" ]

env:
    CARGO_TERM_COLOR: always

jobs:
    build:
        runs-on: ubuntu-22.04
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Rust nightly
              uses: dtolnay/rust-toolchain@nightly
              with:
                  components: rust-src

            - name: Rust Cache
              uses: Swatinem/rust-cache@v2 # Магия кэширования зависимостей

            - name: Build API
              run: cargo build --release --bin getareel

            - name: Upload API binary
              uses: actions/upload-artifact@v4
              with:
                  name: getareel-bin
                  path: target/release/getareel
                  if-no-files-found: error

    collect-binaries:
        runs-on: ubuntu-latest
        needs: [ build ]
        steps:
            - name: Download api
              uses: actions/download-artifact@v4
              with:
                  name: getareel-bin
                  path: bin/

            - name: Check binary
              run: |
                  ls -R bin/
                  chmod +x bin/getareel
